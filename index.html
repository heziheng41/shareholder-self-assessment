<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股东出资自测互动版</title>
    <meta http-equiv="refresh" content="0; url=https://heziheng41.github.io/shareholder-self-assessment/股东出资自测互动版.html">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            color: #fff;
        }
        .loading {
            font-size: 24px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #00ffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .fallback {
            margin-top: 30px;
            font-size: 14px;
            color: #ccc;
        }
        .fallback a {
            color: #00ffff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div class="loading">正在跳转...</div>
    <div class="fallback">
        如果没有自动跳转，请点击 <a href="https://heziheng41.github.io/shareholder-self-assessment/股东出资自测互动版.html">这里</a>
    </div>
</body>
</html>
